version: 2
canonical_source: STATUS.md
task_queue: tasks/NEXT.md
purpose: >
  Machine-readable hypothesis registry for the Research OS layer. These are not
  claims of success; they are testable directions with exit criteria so agents
  can decide whether to prove, experiment, document, or freeze a route.
status_vocabulary:
  active: "Current non-experimental work tied to an active task."
  closed: "Exit criteria met; retained as durable decision evidence."
  parked: "No work is authorized until resume_after is satisfied."

hypotheses:
  - id: H1_RESEARCH_OS_TRUTH_LAYER
    title: "The highest-ROI next step is hardening the Research OS truth layer"
    direction: "platform"
    status: "closed"
    resolution: "The canonical status, result/source registries, artifact map, formal substrate, and exhaustive consistency gates are landed."
    owner: "ops"
    why_it_matters: >
      The verified substrate is already valuable, but agents and public readers
      need one reliable route from canonical counts to active work.
    evidence_for:
      - "STATUS.md, data/stats.json, data/frontier_map.json, and dashboard artifacts already exist."
      - "The audit identifies truth drift and small-context orientation as the main operational risk."
    evidence_against:
      - "Some drift has already been reduced by docs-sync and generated STATUS.md."
    tests:
      - "Add a consistency gate over stats, frontier, graph, status, site counters, tasks, and hypotheses."
      - "Keep tasks/NEXT.md to 3-7 active tasks."
    exit_criteria:
      - "scripts/check_status_consistency.py passes locally and in CI."
      - "Small-context agents can start from STATUS.md and tasks/NEXT.md."

  - id: H2_GLV_SUBGROUP_VS_WHOLE_GROUP
    title: "The GLV result must be stated at the exact proved scope"
    direction: "formalization"
    status: "closed"
    resolution: "The subgroup-versus-whole-group scope is now stated consistently."
    owner: "proof-docs"
    why_it_matters: >
      The crypto-subgroup statement and the whole-point-group statement carry
      different trust and foundation requirements.
    evidence_for:
      - "glvPoint = [λ] is proved on ALL of ⟨G⟩ (secp256k1_glvPoint_eq_lam_on_zmultiples)."
      - "Module (ZMod n) on ⟨G⟩ + the instantiated protocol algebra are proved via the weak keystone addOrderOf G = n."
      - "The whole-group statement (E(𝔽_p)=⟨G⟩ cofactor 1, E[n]≅(ℤ/n)²) genuinely needs the strong keystone #E=n / Hasse."
    evidence_against:
      - "None outstanding: gen_status.py prose corrected in the truth-layer PR; the ⟨G⟩-vs-full-group split is now stated consistently."
    tests:
      - "check_status_consistency.py + a wording audit of README, STATUS, ABSTRACT_SCOPE, TRUST_REPORT, VERIFIED, graph."
    exit_criteria:
      - "Docs state: proved on ⟨G⟩ (eigenvalue + Module + protocols); open on full E(𝔽_p); gated by #E=n. (met)"

  - id: H3_GENERIC_SECURITY_SCOPE
    title: "The generic hardness story is strongest when its scope stays narrow"
    direction: "formalization"
    status: "closed"
    resolution: "The generic-model boundary is explicit in the security scope and is a mandatory guardrail in the ECDLP decision substrate."
    owner: "security-scope"
    why_it_matters: >
      The generic lower bound is a real formal contribution, but it must not be
      marketed as unconditional secp256k1 hardness.
    evidence_for:
      - "GenericGroupBound, BSGS, PollardRho, and Security Scope docs separate black-box from non-generic attacks."
    evidence_against:
      - "Public summaries can easily overcompress the distinction."
    tests:
      - "Use the consistency gate and publication templates to require trust-boundary language."
    exit_criteria:
      - "Publication outlines quote the model boundary before stating security implications."

  - id: H4_FRONTIER_TRACEABILITY
    title: "Corpus coverage and theorem coverage should remain visibly separate"
    direction: "data"
    status: "closed"
    resolution: "Corpus and theorem denominators are separated in canonical generated views."
    owner: "frontier"
    why_it_matters: >
      The 486-claim corpus is a frontier map; the theorem ledger is a verified
      asset. Confusing the denominators weakens both.
    evidence_for:
      - "STATUS.md already separates ledger rows from corpus coverage."
      - "frontier_map.json has corpus status summaries."
    evidence_against:
      - "Older summaries and raw HTML counters can be read as theorem coverage."
    tests:
      - "Check STATUS, dashboard, and index wording for distinct denominators."
    exit_criteria:
      - "Site and docs show ledger metrics separately from corpus status metrics."

  - id: H5_SEMAEV_WINDOW
    title: "Any plausible subgeneric route should leave experimental evidence in algebraic relation generation"
    direction: "experiment"
    status: "closed"
    resolution: "Superseded by HYP_GLV_SEMAEV_001; its useful evidence and exit criteria are retained there."
    owner: "experiments"
    why_it_matters: >
      Semaev/Groebner work can produce useful negative evidence even if no attack
      route appears.
    evidence_for:
      - "The frontier map identifies Semaev polynomials and cost models as major blockers."
    evidence_against:
      - "Prime-field curves are expected to hit degree, memory, and relation-yield limits."
    tests:
      - "Create toy-curve benchmark manifests."
      - "Record degree growth, memory peaks, wall time, and relation yield."
    exit_criteria:
      - "A reproducible benchmark note either finds a promising route or closes a tested window."

  - id: H6_PUBLICATION_BOUNDARY_TRACK
    title: "The verified boundary map is publishable even without a subgeneric attack"
    direction: "publication"
    status: "parked"
    resume_after: "The ECDLP decision substrate, benchmark-oracle foundation, route-selection disposition, and one final whole-program adversarial review are complete."
    park_reason: "Publication packaging should consume the final decision state, not race the remaining foundation work."
    owner: "publication"
    why_it_matters: >
      The strongest near-term output is a precise map of what is proved, blocked,
      or out of scope.
    evidence_for:
      - "PUBLISHABLE_UNITS.md, VERIFIED.md, knowledge_graph.json, and TRUST_REPORT.md already exist."
    evidence_against:
      - "Publication drafts need tighter links from claims to theorem names and trust boundaries."
    tests:
      - "Upgrade one publishable unit into a claim/theorem/figure outline."
    exit_criteria:
      - "A reviewer can audit the outline without reading the whole repo."

  - id: H7_ECDLP_DECISION_SUBSTRATE
    title: "Route selection should follow exact applicability and information gain"
    direction: "data"
    status: "closed"
    resolution: "The checked decision layer and neutral evaluator are complete; RS-2026-07-22-001 evaluated all 17 routes, selected none, and left falsifiable reconsideration triggers."
    owner: "research-os"
    why_it_matters: >
      The formal substrate and attack registry are necessary but answer
      different questions. A future reasoner needs a canonical decision layer
      that fixes the target problem, separates threat models, rejects hidden
      assumptions, and builds only foundations required by a viable route.
    evidence_for:
      - "The repository already has machine-readable formal results, attack evidence, and reproducible experimental traces."
      - "The previous claim-count foundation ranking can prioritize large formal gaps that do not improve the exact secp256k1 decision."
      - "Several live notes drifted from the canonical parked experiment status."
    evidence_against:
      - "A decision map can itself become stale unless cross-registry identity, generated views, tasks, and hypothesis authorization are mechanically checked."
    tests:
      - "Build and check repo/ECDLP_DECISION_SUBSTRATE.json."
      - "Generate its human-readable view."
      - "Build a candidate-neutral benchmark/oracle contract without running a parked hypothesis."
    exit_criteria:
      - "Every route and foundation has a checked disposition and resume condition."
      - "No experiment can become active without an explicit route-selection task."
      - "The knowledge graph exposes the decision layer without conflating it with corpus or formal-release maps."

  - id: HYP_GLV_SEMAEV_001
    title: "GLV-symmetrized Semaev index calculus over prime-field j=0 curves"
    direction: "experiment"
    status: "parked"
    resume_after: "A future dated decision supersedes RS-2026-07-22-001, selects R-GLV-SEMAEV, and promotes this hypothesis through TASK-009."
    park_reason: "The mathematical question remains open, but the completed route-selection pass found no exact mechanism and full-cost argument that clears the proposal gate."
    resolution: "partial negative: m=2 orbit-enumeration baseline is constant-factor only"
    result: >
      PARTIAL MEASUREMENT (experiments/p0_glv_semaev/RESULTS.md): direct enumeration of m=2
      pair sums obeys yield ~ c * B_eff^2 / p for the plain, GLV-orbit-keyed, and u=x^3-keyed
      lookup variants. This closes only the narrow claim that a finite GLV orbit changes the
      combinatorial pair-count exponent in this lookup model; it gives constant-factor changes.
      It does NOT test the registered hypothesis about invariant S_m polynomial systems,
      relation-generation cost, degree of regularity, Groebner matrices, higher m, or a genuine
      Petit composed-rational-map construction. Two legacy 24-bit rows also used cofactor 3 with
      an ambient E(F_p) factor base, so they are geometry/yield sanity data rather than valid
      subgroup-logarithm relations. Every reported equality is a real EC equality, but equality
      replay alone cannot establish an ECDLP complexity no-go. No break of secp256k1; the main
      hypothesis remains open pending the polynomial-system experiment originally specified.
    owner: "experiments"
    supersedes: "H5_SEMAEV_WINDOW"
    prior_art: "experiments/p0_glv_semaev/README.md"
    honest_prior: >
      LOW probability of a genuine speedup. This is the project's best *coherent*
      cryptanalytic bet (it unites secp256k1's real structure — j=0, the order-3
      automorphism phi(x,y)=(beta*x,y), the proved eigenvalue lambda on <G>, and
      the formalized S3/S4 — with a genuinely open area), but the expected outcome
      is a NEGATIVE / no-go result. Symmetry-adapted / quasi-homogeneous index
      calculus is known to help over EXTENSION fields (Faugere-Gaudry-Huot-Renault),
      with no known prime-field transfer that changes the exponent; a 3x-6x factor-base reduction is only a
      constant factor. Run as an experiment through the substrate, not as an
      expected break.
    claim: >
      Closing a Semaev factor base under the GLV automorphism orbit and rewriting
      the S_m relation systems in automorphism invariants (u = x^3, or y) reduces
      not just linear-algebra size but relation-generation cost / degree of
      regularity for prime-field j=0 curves E_b: y^2 = x^3 + b over p = 1 mod 3.
    why_it_matters: >
      If (and only if) invariant coordinates change the ASYMPTOTIC relation-generation
      behaviour, prime-field ECDLP could drop below generic sqrt(n). Even a rigorous
      negative result is a publishable no-go and exercises the experiment substrate.
    evidence_for:
      - "secp256k1 has j=0, CM by Z[zeta_3], and a proved order-3 GLV eigenvalue on <G>."
      - "S3 (full characterization) and S4 (both directions) are formalized; (beta*x)^3 = x^3 so x^3 and y are phi-invariant."
      - "Symmetry-adapted index calculus gave real gains over extension fields (FGHR)."
    evidence_against:
      - "The prime-field obstruction is RELATION GENERATION, not factor-base size; symmetry does not obviously touch it."
      - "GLV orbit size 3 -> at most ~6x base reduction = constant factor, not an exponent change."
      - "Smooth part of p-1 for secp256k1 is tiny (2*3*7*13441), so p-1-smoothness routes look weak (see P1)."
    tests:
      - "Build a family of toy j=0 curves E_b/F_p (p = 1 mod 3, large prime subgroup); experiments/p0_glv_semaev/toy_curves.py."
      - "COMPLETED PARTIAL: enumerate m=2 pair sums for (1) plain x keys, (2) GLV-orbit keys, and (3) u=x^3 keys; result is constant-factor only in this lookup model."
      - "COMPLETED PARTIAL (P1, experiments/p1_petit/): the m=2 relation step is now done by SOLVING Semaev's S3 quadratic per factor-base x-coordinate (Tonelli-Shanks root-solve of S3(x_i,X,x_R)=0), i.e. O(|F|) field-solves per target rather than the O(|F|^2) pair enumeration of P0. Every reported relation is re-verified by actual EC addition; the measured spurious-root rate is 0 across 16/20/24-bit toy curves (seed=1), the direct empirical signature of Semaev's S3 iff-theorem, and an independent brute-force EC enumeration confirms the solver is complete and sound. At matched effective factor-base size the GLV / u=x^3 orbit closure again yields only a CONSTANT factor (~3x storage reduction), consistent with P0. HONEST SCOPE: this measures only the 2-term S3 solve-and-confirm step; it does NOT test m>=3 Semaev systems, degree of regularity, Groebner-basis cost, or a faithful Petit composed-rational-map construction, and draws NO asymptotic or advantage/no-advantage conclusion. The question remains open; execution is PARKED."
      - "COMPLETED PARTIAL (P1-m3, experiments/p1_petit_m3/): solves S4(x_i,x_j,X,x_R)=Res_Y(S3(x_i,x_j,Y),S3(X,x_R,Y)) for unordered pairs of distinct factor-base indices. The S4-independent brute-force path agrees on the tested distinct-index relation set, with zero reported spurious roots. Repeated-index decompositions are excluded from both paths, and both reuse confirm_relation3, so this is not a separately implemented EC oracle. This is a toy O(|F|^2 * deg4) solve, not an asymptotic result. The question remains open; execution is PARKED."
      - "COMPLETED PARTIAL (P3, experiments/p3_sm_system/): builds and Groebner-solves the explicit finite-set presentation {S_{m+1}=0, f_F(X_i)=0}, where f_F=prod_{a in F}(X-a) has degree |F| by construction. For m=2 a custom graded Macaulay proxy returned 2|F|+1 on |F|=4,6,8,10,12 and two toy-prime sizes. Its two-empty-degree stopping rule has not been externally checked with Singular/Sage/msolve or justified by a Hilbert-series theorem; therefore this is an observed proxy pattern, not an exact or p-independent degree-of-regularity law. The tested coupled U=X^3 auxiliary-variable presentation produced larger/slower matrices, but does not rule out nonredundant invariant formulations. Relation sets replay against independent brute-force EC arithmetic. The question remains open; execution is PARKED."
      - "COMPLETED PARTIAL (P4, experiments/p4_petit/): tests one six-variable composed-polynomial-map presentation at m=2, |F|=4 using P3's unvalidated proxy. The proxy returned 7 versus 9 while the observed Macaulay matrix and time were much larger; the relation set replayed against independently rebuilt brute-force EC data. This is descriptive evidence about one toy presentation, not faithful Petit and not a general composed-map or complexity no-go. The question remains open; execution is PARKED."
      - "REMAINING: reach the m>=3 solving degree (needs a faster GF(p) Groebner/F4 or msolve/Sage, not pure-Python Macaulay), and construct/solve m>=4 (S_5) systems; measure real memory peaks at those degrees."
      - "REMAINING: construct and solve the actual S_m polynomial systems (m>=3) in plain and invariant coordinates without enumerating all EC pair sums."
      - "REMAINING: implement a faithful Petit composed low-degree rational-map construction; integer low-bit filtering is not an F_p-linear subspace or a substitute for that construction."
      - "Measure per size p: relation probability, factor-base size, #relations needed, degree of regularity, max Groebner matrix, time, memory."
      - "Fit an empirical growth exponent in p and build a cost model; every run recorded via experiments/p0_glv_semaev/manifest.py (code+seed+params+versions+hashes+output)."
    exit_criteria:
      - "BREAKTHROUGH (continue + move identities to Lean) only if a stable T(p) = p^(1/2 - eps), eps>0, with a theoretical explanation of the scaling."
      - "CLOSE as no-go if: speedup vanishes after precomputation; only a constant factor; observed scaling exponent does not improve; or gains appear only on singular hand-picked curves."
      - "Either way: a reproducible benchmark note + a BARRIERS.md / no-go registry entry; Lean only on a positive, explained result."

  - id: HYP_WARD_EDS_001
    title: "Ward elliptic divisibility sequences as a structural probe of torsion/apparition on prime-field toy curves"
    direction: "experiment"
    status: "parked"
    resume_after: "A future dated decision supersedes RS-2026-07-22-001, selects R-EDS-DIVISION-POLYNOMIAL, and promotes this hypothesis through TASK-009."
    park_reason: "The numerical confirmation is complete; the route has no identified non-reencoding mechanism and no further experiment is authorized."
    owner: "experiments"
    prior_art: "experiments/p2_ward_eds/README.md"
    result: >
      MEASUREMENT ONLY (experiments/p2_ward_eds/RESULTS.md): on cofactor-1 j=0 toy curves
      E_b: y^2 = x^3 + b over p = 1 mod 3 (16/20/24-bit, seed=1), the normalized Ward EDS
      W_n = psi_n(P) mod p was computed via closed forms W_0..W_4 plus the doubling recurrence
      and cross-checked against Ward's full master recurrence and the n=2 Somos-4 slice proved
      in Ecdlp/Proved/NormEDSSomos4.lean. The rank of apparition rho(P) = least n>0 with
      W_n ≡ 0 mod p was measured to equal ord(P) = ell, and the zero set {n : W_n ≡ 0} to
      equal the multiples of ord(P), with EVERY torsion fact independently re-verified by actual
      ec_mul (rho(G)=ord(G)=ell and 0 mismatches across ~2100 (P,n) torsion checks;
      validate.py prints VALIDATION: PASS). This CONFIRMS the classical psi_n-torsion
      equivalence numerically and nothing more.
    honest_prior: >
      NO speedup expected, and none is claimed. This rung is DESCRIPTIVE: it confirms an
      already-known theorem (W_n ≡ 0 ⟺ [n]P = O) on toy curves. EDS re-encode point
      arithmetic — the coordinate identity x([n]P) = x_P - W_{n-1}W_{n+1}/W_n^2 makes this
      explicit — and give no known prime-field ECDLP advantage. Computing rho(P) is Theta(ord(P))
      work, the SAME order as the DLP it would need to solve; the O(log n) single-term evaluator
      computes W_n at a GIVEN n and does not find the first zero cheaply. Run as reconnaissance
      through the substrate, not as a cryptanalytic bet.
    claim: >
      The Ward/EDS apparition structure (rho(P) = ord(P); zero set = multiples of ord(P)) holds
      exactly on prime-field cofactor-1 toy curves and can be measured and independently
      re-verified by ec_mul as a reusable structural probe of point order/torsion.
    why_it_matters: >
      A measured, ec_mul-verified handle on EDS apparition gives the substrate a reproducible
      torsion/order probe and an empirical companion to the formalized normEDS Somos-4 / Ward
      facts, WITHOUT asserting any DLP consequence. It also stress-tests the honesty protocol:
      the deliverable is a confirmation of known structure with explicit non-advantage scope.
    evidence_for:
      - "Torsion/apparition property W_n ≡ 0 mod p ⟺ [n]P = O is a classical theorem; Somos-4/Ward recurrences for normEDS are formalized in Ecdlp/Proved/NormEDSSomos4.lean and companions."
      - "Measured: rho(G)=ord(G)=ell and zero set = multiples of ord on 16/20/24-bit curves, all ec_mul-confirmed (VALIDATION: PASS)."
    evidence_against:
      - "EDS re-encode point arithmetic; the coordinate identity ties W_n directly to ec_mul, so there is no independent information and no known prime-field DLP advantage."
      - "Finding rho(P) is Theta(ord(P)) — no cheaper than the DLP — so apparition is not an attack primitive."
    tests:
      - "COMPLETED (experiments/p2_ward_eds/): compute W_n mod p via closed forms + doubling recurrence; measure rho(P) and the zero set; independently re-verify W_n ≡ 0 ⟺ [n]P = O and rho(G)=ord(G)=ell by ec_mul; validate.py prints VALIDATION: PASS/FAIL."
      - "Triangulate EDS correctness against Ward's master recurrence, the n=2 Somos-4 slice, the multiplication coordinate identity, and (over Z, tiny cases) integer EDS growth/torsion apparition."
    exit_criteria:
      - "CONFIRM-AND-CLOSE (default expected): apparition/torsion equivalence reproduced and ec_mul-verified across sizes with 0 mismatches, documented with explicit non-advantage scope. (met numerically; keep as a descriptive probe.)"
      - "ESCALATE only if a measurement ever shows W_n ≡ 0 predicting [n]P = O CHEAPER than computing the order (i.e. sub-Theta(ord) apparition) with a theoretical explanation — not observed and not expected."
      - "Any Lean work only on a genuinely new, explained positive result; a numerical confirmation of known torsion structure triggers no formalization."
