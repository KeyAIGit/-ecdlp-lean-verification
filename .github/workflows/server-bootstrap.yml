name: Bootstrap server (one-time, password → key + Lean+CAS)

# One-time bootstrap so the dev/automation never needs manual SSH. A GitHub Actions
# runner (which CAN reach the server, unlike the dev sandbox) logs in with the
# CURRENT root password, installs our public key into authorized_keys, then sets up
# Lean+Mathlib+CAS. After this, the key-based `server-run.yml` works and the password
# can be retired.
#
# REQUIRED repository secrets (Settings → Secrets and variables → Actions):
#   SERVER_HOST      — server IP (e.g. 23.88.61.86)
#   SERVER_PASSWORD  — current root password (delete this secret after success)
#
# Manual only. Idempotent: safe to re-run (key not duplicated, clone guarded,
# `lake exe cache get` resumable).

on:
  workflow_dispatch:

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    steps:
      - name: Install sshpass
        run: sudo apt-get update -q && sudo apt-get install -y -q sshpass

      - name: Install key + Lean+CAS over SSH (password)
        env:
          HOST: ${{ secrets.SERVER_HOST }}
          PW: ${{ secrets.SERVER_PASSWORD }}
        run: |
          set -e
          if [ -z "$HOST" ] || [ -z "$PW" ]; then
            echo "::error::Set both SERVER_HOST and SERVER_PASSWORD repository secrets."; exit 1
          fi
          cat > remote.sh <<'EOS'
          set -e
          PUBKEY='ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIKsAYCwq/iCpycx/jUvcMFbaywZc0D9lNAJ91yBjMN38 ecdlp-server'
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          grep -qF "$PUBKEY" ~/.ssh/authorized_keys 2>/dev/null || echo "$PUBKEY" >> ~/.ssh/authorized_keys
          chmod 600 ~/.ssh/authorized_keys
          echo "[bootstrap] public key installed in authorized_keys"
          [ -d ~/-ecdlp-lean-verification ] || git clone --quiet https://github.com/KeyAIGit/-ecdlp-lean-verification.git ~/-ecdlp-lean-verification
          cd ~/-ecdlp-lean-verification && git pull --quiet || true
          echo "[bootstrap] repo ready; running server-setup.sh (Lean+Mathlib cache + CAS, 10+ min)..."
          WITH_CAS=1 bash scripts/server-setup.sh
          echo "[bootstrap] DONE — key-based access + Lean + CAS are ready"
          EOS
          sshpass -p "$PW" ssh -o StrictHostKeyChecking=accept-new -o ConnectTimeout=25 \
            root@"$HOST" 'bash -s' < remote.sh 2>&1 | tee bootstrap.log

      - name: Upload bootstrap log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bootstrap-log
          path: bootstrap.log
          if-no-files-found: ignore
