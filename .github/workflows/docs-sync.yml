name: Docs sync

# Makes doc-drift structurally impossible. Almost every derived artifact in the repo is a
# pure function of a small set of committed sources (VERIFIED.md, the claim corpus, and the
# generator scripts). This workflow regenerates ALL of them with the repo's own scripts,
# runs the count-consistency gate, and then:
#   - on push to main / manual dispatch: auto-commits any regenerated file with [skip ci];
#   - on a pull request: FAILS if regeneration changed a PURE artifact, so drift is caught
#     in review instead of being silently committed.
#
# SUPERSEDES stats.yml: this is a strict superset (it regenerates stats.json + badge +
# dashboard as well), so stats.yml was retired to avoid two workflows racing to push.
#
# The public site generator is deterministic. Machine-readable views and all four site pages
# are regenerated and drift-gated together on pull requests.
#
# Derived files (never hand-edit — regenerate via the scripts below):
#   PURE  (drift-gated on PRs):
#     data/stats.json, badges/theorems.json   (gen_stats.py)
#     data/frontier_map.json                   (build_frontier_map.py)
#     data/knowledge_graph.json, .md           (build_knowledge_graph.py)
#     COVERAGE.md                              (coverage_report.py)
#     STATUS.md                                (gen_status.py)
#     data/result_registry.json                (gen_result_registry.py)
#     Ecdlp/LedgerAxiomAudit.lean              (gen_axiom_audit.py)
#     data/source_registry.json                (gen_source_registry.py)
#     repo/ECDLP_DECISION_SUBSTRATE.md         (build_ecdlp_decision_view.py)
#     bundles/MANIFEST.json                    (export_agent_bundle.py)
#     dashboard.html, index.html, explore.html, pilot.html (build_dashboard.py -> site_generator.py)

on:
  push:
    branches: [main]
    paths:
      - 'README.md'
      - 'AGENTS.md'
      - 'CLAUDE.md'
      - 'VERIFIED.md'
      - 'data/KG_CLAIM_FORMALIZATION_v1.csv'
      - 'data/corpus_coverage_overrides.json'
      - 'STATUS.md'
      - 'tasks/**'
      - 'experiments/**'
      - 'REPOSITORY_ARCHITECTURE.md'
      - 'ROADMAP.md'
      - 'repo/**'
      - 'scripts/**'
      - 'notes/**'
      - 'domains/**'
      - 'BARRIERS.md'
      - 'PUBLISHABLE_UNITS.md'
      - 'TRUST_REPORT.md'
      - 'ABSTRACT_SCOPE.md'
      - 'notes/FOUNDATIONS.md'
      - 'dashboard.html'
      - 'index.html'
      - 'explore.html'
      - 'pilot.html'
      - 'assets/**'
  pull_request:
    paths:
      - 'README.md'
      - 'AGENTS.md'
      - 'CLAUDE.md'
      - 'VERIFIED.md'
      - 'data/KG_CLAIM_FORMALIZATION_v1.csv'
      - 'data/corpus_coverage_overrides.json'
      - 'STATUS.md'
      - 'tasks/**'
      - 'experiments/**'
      - 'REPOSITORY_ARCHITECTURE.md'
      - 'ROADMAP.md'
      - 'repo/**'
      - 'scripts/**'
      - 'notes/**'
      - 'domains/**'
      - 'BARRIERS.md'
      - 'PUBLISHABLE_UNITS.md'
      - 'TRUST_REPORT.md'
      - 'ABSTRACT_SCOPE.md'
      - 'notes/FOUNDATIONS.md'
      - 'dashboard.html'
      - 'index.html'
      - 'explore.html'
      - 'pilot.html'
      - 'assets/**'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: docs-sync-${{ github.ref }}
  cancel-in-progress: true

env:
  # PURE artifacts — pure functions of committed sources, so regeneration must be a no-op.
  # These are the ones the PR drift gate enforces. Order respects the data-flow:
  # stats.json + frontier_map.json feed STATUS.md, so they are generated first.
  DERIVED_PURE: >-
    data/stats.json
    badges/theorems.json
    data/frontier_map.json
    data/knowledge_graph.json
    data/knowledge_graph.md
    COVERAGE.md
    STATUS.md
    data/result_registry.json
    Ecdlp/LedgerAxiomAudit.lean
    data/source_registry.json
    repo/ECDLP_DECISION_SUBSTRATE.md
    bundles/MANIFEST.json
    dashboard.html
    index.html
    explore.html
    pilot.html

jobs:
  docs-sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ---- regenerate every derived artifact from its real source, in dependency order ----
      - name: Stats + badge (data/stats.json, badges/theorems.json)
        run: python3 scripts/gen_stats.py
      - name: Frontier map (data/frontier_map.json)
        run: python3 scripts/build_frontier_map.py
      - name: Result registry (data/result_registry.json — Lean decls vs VERIFIED.md citations)
        run: python3 scripts/gen_result_registry.py
      - name: Full-ledger axiom audit
        run: python3 scripts/gen_axiom_audit.py
      - name: Knowledge graph (data/knowledge_graph.json + .md)
        run: python3 scripts/build_knowledge_graph.py
      - name: Coverage report (COVERAGE.md)
        run: python3 scripts/coverage_report.py
      - name: Canonical snapshot (STATUS.md)
        run: python3 scripts/gen_status.py
      - name: Source registry (data/source_registry.json — cited works ↔ docs provenance)
        run: python3 scripts/gen_source_registry.py
      - name: ECDLP decision view (repo/ECDLP_DECISION_SUBSTRATE.md)
        run: python3 scripts/build_ecdlp_decision_view.py
      # Regenerated LAST: the manifest records byte sizes of the tier files above
      # (STATUS.md, COVERAGE.md, knowledge_graph.json, …), so its inputs must be fresh first.
      - name: Agent-bundle manifest (bundles/MANIFEST.json)
        run: python3 scripts/export_agent_bundle.py --manifest
      - name: Dashboard + public site (dashboard.html, index.html, explore.html, pilot.html)
        run: python3 scripts/build_dashboard.py

      # ---- consistency gate: no retired headline counts, canonical figure present ----
      - name: Count-consistency gate
        run: python3 scripts/check_counts.py
      - name: Research OS consistency gate
        run: python3 scripts/check_status_consistency.py
      - name: Product model and public-claim gate
        run: python3 scripts/check_product_model.py
      - name: Product-model evidence lifecycle fixtures
        run: python3 scripts/test_check_product_model.py
      - name: Formal-substrate architecture gate
        run: python3 scripts/check_formal_substrate.py
      - name: ECDLP decision-substrate gate
        run: python3 scripts/check_ecdlp_decision_substrate.py
      - name: Candidate-evaluation framework tests
        run: python3 experiments/framework/test_framework.py
      - name: Repository artifact manifest gate
        run: python3 scripts/check_repo_artifacts.py
      - name: Result-registry gate (VERIFIED.md citations resolve to Lean source)
        run: python3 scripts/gen_result_registry.py --check
      - name: Full-ledger axiom-audit generation gate
        run: python3 scripts/gen_axiom_audit.py --check
      - name: Generated-artifact fixpoint gate
        run: python3 scripts/check_generated_fixpoint.py --check
      - name: Source-registry gate (cited works ↔ docs provenance in sync)
        run: python3 scripts/gen_source_registry.py --check

      # ---- did regeneration change any generated artifact? ----
      - name: Detect derived-artifact drift
        id: drift
        run: |
          if git diff --quiet -- $DERIVED_PURE; then
            echo "dirty=false" >> "$GITHUB_OUTPUT"
            echo "generated artifacts already in sync with sources"
          else
            echo "dirty=true" >> "$GITHUB_OUTPUT"
            echo "::group::derived-artifact drift"
            git --no-pager diff --stat -- $DERIVED_PURE
            echo "::endgroup::"
          fi

      # ---- on a PR: fail so drift is fixed in review (never auto-commit onto someone's PR) ----
      - name: Fail on drift (pull request)
        if: github.event_name == 'pull_request' && steps.drift.outputs.dirty == 'true'
        run: |
          echo "::error::Derived artifacts are stale. Run ALL the generators locally (in this order) and commit the result:"
          echo "  python3 scripts/gen_stats.py && python3 scripts/build_frontier_map.py"
          echo "  python3 scripts/gen_result_registry.py && python3 scripts/gen_axiom_audit.py"
          echo "  python3 scripts/build_knowledge_graph.py && python3 scripts/coverage_report.py"
          echo "  python3 scripts/gen_status.py"
          echo "  python3 scripts/gen_source_registry.py && python3 scripts/build_ecdlp_decision_view.py"
          echo "  python3 scripts/export_agent_bundle.py --manifest"
          echo "  python3 scripts/build_dashboard.py"
          git --no-pager diff -- $DERIVED_PURE
          exit 1

      # ---- on main / manual run: auto-commit the refreshed artifacts ----
      - name: Commit refreshed artifacts
        if: github.event_name != 'pull_request'
        run: |
          if git diff --quiet -- $DERIVED_PURE; then
            echo "nothing to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add $DERIVED_PURE
          git commit -m "chore(docs): resync derived artifacts from sources [skip ci]"
          git push
