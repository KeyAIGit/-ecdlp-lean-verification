name: Verify Lean proofs

# Triggers: every push, every pull request, and manual run.
# (The hourly `schedule` cron was removed — it rebuilt all of Mathlib every hour and
# burned Actions minutes for no benefit. Verification runs on push / PR / dispatch.)
on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: prover-trial-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 55
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Cheap doc gate: fail on count drift (the headline count regressed 3x).
      - name: Check count consistency (docs)
        run: python3 scripts/check_counts.py

      # Regression fixtures for the count-gate hardening (table-identity guard, bidirectional
      # off-canonical scan, canonical-line uniqueness). Fast, pure-Python, no toolchain.
      - name: Count-gate fixtures
        run: python3 scripts/test_check_counts.py

      # Semantic-drift gate: fail if a retired unconditional overclaim (full Shoup, proved
      # Θ(√n), universal GLV no-go, Semaev prime-field no-advantage, unconditional trace)
      # reappears in the docs / Lean docstrings / publication surfaces.
      - name: Check semantic drift (overclaims)
        run: python3 scripts/check_semantic_drift.py

      # Research OS gate: fail when generated machine views, canonical status,
      # public counters, active tasks, or hypotheses drift apart.
      - name: Check Research OS consistency
        run: python3 scripts/check_status_consistency.py

      - name: Check product model and public-claim boundary
        run: python3 scripts/check_product_model.py

      - name: Test product-model evidence lifecycle
        run: python3 scripts/test_check_product_model.py

      - name: Check formal-substrate architecture
        run: python3 scripts/check_formal_substrate.py

      - name: Check ECDLP decision substrate
        run: python3 scripts/check_ecdlp_decision_substrate.py

      - name: Check generated ECDLP decision view
        run: python3 scripts/build_ecdlp_decision_view.py --check

      - name: Test candidate-evaluation framework
        run: python3 experiments/framework/test_framework.py

      # Repo architecture gate: keep the manifest/review packet honest before
      # any cleanup PR can rely on them.
      - name: Check repository artifact manifest
        run: python3 scripts/check_repo_artifacts.py

      - name: Check workflow automation inventory
        run: python3 scripts/check_automation_inventory.py

      - name: Check remote branch inventory snapshot
        run: python3 scripts/check_branch_inventory.py

      - name: Test canonical ledger parser
        run: python3 scripts/test_ledger_utils.py

      - name: Test axiom-output parser
        run: python3 scripts/test_check_axioms.py

      # Provenance gate: every theorem name cited in VERIFIED.md must resolve to an actual
      # declaration in the built Lean source (Ecdlp/ minus Targets/) — catches ledger drift
      # from a renamed/removed theorem, deriving the registry from source not a hand number.
      - name: Check result registry (VERIFIED.md ↔ Lean source)
        run: python3 scripts/gen_result_registry.py --check

      - name: Check generated full-ledger axiom audit
        run: python3 scripts/gen_axiom_audit.py --check

      # Provenance gate (literature side): every external work the docs cite (Shoup, Nechaev,
      # Semaev, Gaudry, Diem, FGHR, Petit, Pollard, Pohlig–Hellman, Schoof, Frey–Rück, MOV,
      # Smart, SEC 2, GLV, Shor, Luo) must have a registry entry, and its recorded where_used
      # must match the current
      # docs — catches a citation added/moved without updating the bibliography provenance.
      - name: Check source registry (docs ↔ bibliography provenance)
        run: python3 scripts/gen_source_registry.py --check

      # Agent-bundle gate: the committed context-tier routing table
      # (bundles/MANIFEST.json) must reference only files that exist and stay in
      # sync with the tier definitions in scripts/export_agent_bundle.py.
      - name: Check agent-bundle manifest
        run: python3 scripts/export_agent_bundle.py --check

      - name: Check generated-artifact fixpoint
        run: python3 scripts/check_generated_fixpoint.py --check

      # Domain-registry honesty gate (Phase-1 platform layer): a 'live' domain must
      # have its slot files present; 'planned'/'exploratory' placeholders must claim
      # no metrics. Keeps the multi-domain site surface provably honest.
      - name: Check domain registry
        run: python3 scripts/check_domains.py

      # Prover-loop registry hygiene: every OPEN target must have a stem on disk, else the
      # loop silently no-ops it. Foreign files (queue.json) are ignored.
      - name: Check prover target registry
        run: python3 scripts/check_targets.py

      # Fast, cheap gate: fail before building if any BUILT proof is left incomplete.
      # Scope: only *.lean files in the built proof base. Ecdlp/Targets/ holds open
      # conjecture stems (with `sorry`) that are intentionally NOT imported/built, so
      # they are excluded here. Restricting to *.lean avoids prose false-positives in
      # README/markdown files that legitimately discuss `sorry`.
      - name: Ensure no incomplete proofs remain (built proof base only)
        run: |
          # The AxiomAudit harnesses contain only `#print axioms` commands plus docs that
          # legitimately mention `sorryAx`; they contain no proofs and are not imported,
          # so exclude both to avoid a prose false-positive. The generated ledger audit's
          # `sorryAx` check is the robust no-sorry gate (scripts/check_axioms.py).
          if grep -rniI --include='*.lean' --exclude-dir=Targets --exclude='*AxiomAudit.lean' 'sorry' Ecdlp.lean Ecdlp/ ResearchOS/ ResearchOS.lean; then
            echo "::error::Found 'sorry' in a built Lean file - a proof is incomplete"
            exit 1
          fi
          echo "All built proofs complete: no 'sorry' outside Ecdlp/Targets/ (Ecdlp.lean + Ecdlp/ + ResearchOS/ scanned)"

      # Close the latent hole: `sorry` is a warning, and the grep above skips Targets/.
      # If any BUILT file ever imported a Targets stem, a `sorry` could reach the build
      # graph undetected. Forbid `import Ecdlp.Targets` outside Targets/ itself.
      - name: Ensure no built file imports an open target stem
        run: |
          if grep -rnI --include='*.lean' --exclude-dir=Targets 'import Ecdlp.Targets' Ecdlp/; then
            echo "::error::A built Lean file imports Ecdlp.Targets (open stems carry 'sorry')"
            exit 1
          fi
          echo "No built file imports Ecdlp.Targets."

      - name: Install elan (Lean toolchain manager)
        run: |
          curl -fsSL https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh \
            | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Fetch prebuilt Mathlib cache
        run: lake exe cache get

      # Cache the project's OWN compiled artifacts (.lake/build) across runs so `lake build`
      # rebuilds only files that actually changed instead of recompiling everything — most
      # of the wall-clock is the repo's `native_decide` facts on 256-bit numbers (primality
      # Pratt certificates, GLV), which rarely change. Safe: lake is trace-based, so it
      # re-verifies every artifact against its inputs (source + dep oleans + toolchain) and
      # rebuilds anything stale; a stale restore can only slow a run, never admit a wrong
      # result. Key is per-commit (always saves a fresh cache); restore-keys fall back to
      # the most recent build for the same toolchain/manifest.
      - name: Cache project build (.lake/build) for incremental rebuilds
        uses: actions/cache@v4
        with:
          path: .lake/build
          key: lake-build-${{ runner.os }}-${{ hashFiles('lean-toolchain', 'lakefile.toml', 'lake-manifest.json') }}-${{ github.sha }}
          restore-keys: |
            lake-build-${{ runner.os }}-${{ hashFiles('lean-toolchain', 'lakefile.toml', 'lake-manifest.json') }}-
            lake-build-${{ runner.os }}-

      - name: Build and verify ALL proofs
        run: lake build

      # Trust gate: assert no built result depends on `sorryAx` or any axiom outside the
      # allowed base {propext, Classical.choice, Quot.sound, Lean.ofReduceBool}. This is
      # what makes the "no axioms" claim machine-enforced rather than just documented; it
      # also surfaces exactly which results extend the TCB via native_decide.
      - name: Axiom audit (no sorryAx, no custom axioms)
        run: |
          lake env lean Ecdlp/LedgerAxiomAudit.lean > axiom_audit.txt 2>&1 \
            || { echo "::error::axiom audit file failed to elaborate"; cat axiom_audit.txt; exit 1; }
          cat axiom_audit.txt
          python3 scripts/check_axioms.py axiom_audit.txt data/result_registry.json

      # Open conjecture stems in Ecdlp/Targets/ are not part of the build graph. This
      # step typechecks them so the generator's output is at least well-formed Lean.
      # `sorry` is a warning (not an error), so a stem with `sorry` passes; a genuine
      # syntax/type error is surfaced as a warning here but never blocks the build.
      - name: Typecheck open target stems (non-blocking, sorry allowed)
        continue-on-error: true
        run: |
          shopt -s nullglob
          stems=(Ecdlp/Targets/*.lean)
          if [ ${#stems[@]} -eq 0 ]; then
            echo "No open target stems in Ecdlp/Targets/."
            exit 0
          fi
          for f in "${stems[@]}"; do
            echo "== lean typecheck: $f =="
            lake env lean "$f" || echo "::warning::stem failed to typecheck: $f"
          done

      # The per-push prover attempt was removed: it re-proved the already-verified
      # smoke target (targets/001, status=verified) on every push, spending model
      # attempts for no new information. The standalone dispatch workflow
      # (.github/workflows/prover-target-attempt.yml) remains for on-demand runs.
