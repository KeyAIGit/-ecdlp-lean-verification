name: Prover smoke test

on:
  workflow_dispatch:
    inputs:
      attempts:
        description: Number of proof attempts per model
        required: true
        default: '4'

permissions:
  contents: read

jobs:
  prover-smoke:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        model:
          - Pythagoras-LM/Pythagoras-Prover-4B
          - Goedel-LM/Goedel-Prover-V2-32B
          - AI-MO/Kimina-Prover-Distill-8B
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install elan (Lean toolchain manager)
        run: |
          curl -fsSL https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh \
            | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Fetch prebuilt Mathlib cache
        run: lake exe cache get

      - name: Run prover smoke test for ${{ matrix.model }}
        id: prover
        continue-on-error: true
        env:
          FEATHERLESS_API_KEY: ${{ secrets.FEATHERLESS_API_KEY }}
          INPUT_ATTEMPTS: ${{ inputs.attempts }}
        run: |
          ATTEMPTS="${INPUT_ATTEMPTS:-4}"
          python3 scripts/prover_smoke_test.py \
            --model "${{ matrix.model }}" \
            --attempts "$ATTEMPTS"

      - name: Write job summary
        if: always()
        run: |
          echo "## Prover smoke test" >> "$GITHUB_STEP_SUMMARY"
          echo "Model: ${{ matrix.model }}" >> "$GITHUB_STEP_SUMMARY"
          echo "Step outcome: ${{ steps.prover.outcome }}" >> "$GITHUB_STEP_SUMMARY"
          echo "Step conclusion: ${{ steps.prover.conclusion }}" >> "$GITHUB_STEP_SUMMARY"
          if [ -f prover-smoke-report.md ]; then
            cat prover-smoke-report.md >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload prover smoke report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: prover-smoke-report-${{ strategy.job-index }}
          path: |
            prover-smoke-report.md
            prover-smoke-success.lean
            ProverSmoke.lean
          if-no-files-found: ignore
