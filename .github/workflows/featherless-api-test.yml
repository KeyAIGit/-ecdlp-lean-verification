name: Featherless API test

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/featherless-api-test.yml'

permissions:
  contents: read

jobs:
  test-featherless:
    runs-on: ubuntu-latest
    steps:
      - name: Confirm secret exists
        env:
          FEATHERLESS_API_KEY: ${{ secrets.FEATHERLESS_API_KEY }}
        run: |
          if [ -z "$FEATHERLESS_API_KEY" ]; then
            echo "::error::FEATHERLESS_API_KEY is missing or not available to this workflow."
            exit 1
          fi
          echo "Secret is present. Value is hidden."

      - name: API smoke test
        env:
          FEATHERLESS_API_KEY: ${{ secrets.FEATHERLESS_API_KEY }}
        run: |
          set -euo pipefail
          status=$(curl -sS -o models.json -w "%{http_code}" \
            "https://api.featherless.ai/v1/models?available_on_current_plan=true" \
            -H "Authorization: Bearer ${FEATHERLESS_API_KEY}")
          echo "HTTP status: ${status}"
          if [ "$status" != "200" ]; then
            echo "::error::Featherless API check failed with HTTP ${status}."
            cat models.json
            exit 1
          fi
          python3 - <<'PY'
import json
with open('models.json', 'r', encoding='utf-8') as f:
    payload = json.load(f)
models = payload.get('data', [])
ids = [m.get('id') for m in models if isinstance(m, dict) and m.get('id')]
print(f"Available model count: {len(ids)}")
for target in ["Pythagoras-LM/Pythagoras-Prover-4B", "Goedel-LM/Goedel-Prover-V2-32B"]:
    matches = [m for m in ids if target.lower() in m.lower() or target.split('/')[-1].lower() in m.lower()]
    if matches:
        print(f"FOUND {target}: {matches[:5]}")
    else:
        print(f"WARNING: {target} not found in first response / current plan list")
print("Featherless API authentication works.")
PY
