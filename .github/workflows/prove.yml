name: Autonomous prover (Layer 2)

# Runs the registry prover loop (Tier 0 tactic ladder -> Featherless models) over
# open targets. Lean-accepted candidates are surfaced as artifacts and, when found,
# opened as a PR for human promotion. main is NEVER edited automatically: the Lean
# kernel verifies each candidate, and a human reviews and merges the PR.
on:
  workflow_dispatch:
  # SECURITY (2026-07 audit): the scheduled cron was removed. This workflow executes
  # model-generated candidates (`lake` elaborates untrusted Lean, which can run code via
  # native_decide) with FEATHERLESS_API_KEY / GITHUB_TOKEN in the runner env. Unattended
  # execution of untrusted code with live secrets is unsafe — run manually only, and only
  # once the runner is a secret-free, network-off, ephemeral sandbox. See
  # notes/EXECUTION_SECURITY.md.

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: prove-${{ github.ref }}
  cancel-in-progress: false

jobs:
  prove:
    runs-on: ubuntu-latest
    timeout-minutes: 55
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install elan (Lean toolchain manager)
        run: |
          curl -fsSL https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh \
            | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Fetch prebuilt Mathlib cache
        run: lake exe cache get

      # `lake env lean` (used by the loop to check candidates) needs every imported
      # olean present. `cache get` can return a partial cache, so build the project
      # first to compile any cache-missing Mathlib files and the project itself —
      # otherwise `import Mathlib` fails and every Tier-0 attempt fails fast.
      - name: Build project (compile any cache-missing Mathlib + Ecdlp)
        run: lake build

      - name: Run autonomous prover loop
        env:
          FEATHERLESS_API_KEY: ${{ secrets.FEATHERLESS_API_KEY }}
        run: python3 scripts/prover_loop.py

      # Mechanically promote each Lean-accepted candidate into the verified base:
      # candidates/<id>.lean -> Ecdlp/Proved/<Module>.lean, add the import, set the target
      # status=verified, append a coverage row to VERIFIED.md. Anonymous `example`s and any
      # candidate carrying sorry/admit are skipped. This only MOVES kernel-accepted proofs;
      # `main` is untouched — the promoted change is committed onto the PR branch below and a
      # human merges. Idempotent, so a re-run over the same candidates is a no-op.
      - name: Promote accepted candidates
        if: always()
        run: python3 scripts/promote_candidate.py

      - name: Add loop report to job summary
        if: always()
        run: |
          if [ -f prover-loop-report.md ]; then
            cat prover-loop-report.md >> "$GITHUB_STEP_SUMMARY"
          else
            echo "No prover-loop-report.md was produced." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload loop artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: prover-loop
          path: |
            prover-loop-report.md
            candidates/
          if-no-files-found: ignore

      # Open (or update) a PR carrying the auto-promoted proofs (Ecdlp/Proved/ + import +
      # VERIFIED.md row + target status) plus any non-promotable leftover candidates. No-op
      # when the run produced nothing. `main` is NEVER edited automatically — the change lands
      # on the prover/candidates branch and a human reviews and merges.
      - name: Open PR with promoted proofs
        if: always()
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          base: main
          branch: prover/candidates
          add-paths: |
            Ecdlp/Proved/
            Ecdlp.lean
            VERIFIED.md
            targets/
            candidates/
          title: "Prover loop: auto-promoted proofs for review"
          commit-message: "prover loop: promote Lean-accepted proofs (Targets/ -> Proved/, for human merge)"
          body: |
            The autonomous prover loop closed one or more open targets. Each proof was
            verified by `lake env lean` in this run, then **mechanically promoted** by
            `scripts/promote_candidate.py`: moved into `Ecdlp/Proved/`, imported from
            `Ecdlp.lean`, its target set `status=verified`, and a coverage row appended to
            `VERIFIED.md`. Anonymous `example`s and any candidate with `sorry`/`admit` are
            left under `candidates/` unpromoted.

            `main` is never edited automatically. The Lean kernel is the judge; a human
            reviews this PR (confirm the ledger row and headline-count classification) and
            merges. CI re-verifies the full build and the no-`sorry` gate.

      # Echo the loop report to stdout as the final step so the per-target outcome
      # (and any Featherless model attempts) is readable directly in the run log.
      - name: Echo loop report to log
        if: always()
        run: |
          echo "===== prover-loop-report.md ====="
          cat prover-loop-report.md || echo "(no report produced)"
