name: Update stats

# Keeps the site + machine-readable counts in sync with VERIFIED.md automatically,
# with no manual step: the JSON endpoints (data/stats.json, badges/theorems.json)
# AND the rendered dashboard.html / index.html (served at keyai.org/dashboard.html)
# are regenerated on every merge to main that touches the ledger. Commits the
# regenerated files only if they changed, tagging the commit [skip ci] so it does
# not re-trigger itself.

on:
  push:
    branches: [main]
    paths:
      - 'VERIFIED.md'
      - 'scripts/gen_stats.py'
      - 'scripts/build_dashboard.py'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: stats-${{ github.ref }}
  cancel-in-progress: true

jobs:
  stats:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Regenerate stats from VERIFIED.md
        run: python3 scripts/gen_stats.py
      - name: Rebuild the site (dashboard.html / index.html) from VERIFIED.md
        run: python3 scripts/build_dashboard.py
      - name: Commit if changed
        run: |
          FILES="data/stats.json badges/theorems.json dashboard.html index.html"
          if ! git diff --quiet -- $FILES; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add $FILES
            git commit -m "chore(stats): refresh verified-theorem counts + site [skip ci]"
            git push
          else
            echo "stats + site already current"
          fi
