name: Prover target attempt

# Rerun target attempt: 2026-06-21T20:55Z

on:
  push:
    paths:
      - '.github/workflows/prover-target-attempt.yml'
      - 'scripts/prover_target_attempt.py'
  workflow_dispatch:
    inputs:
      target:
        description: Target theorem to try
        required: true
        default: zmod_from_mod_zero
        type: choice
        options:
          - nat_add_comm
          - zmod_from_mod_zero
          - lambda_cube_root_shape
      fast_attempts:
        description: Pythagoras 4B attempts
        required: true
        default: '4'
      heavy_attempts:
        description: Goedel 32B attempts
        required: true
        default: '2'
      provider:
        description: Drafter provider (moonshot routes all attempts to Kimi kimi-k3)
        required: false
        default: featherless
        type: choice
        options:
          - featherless
          - moonshot
      kimi_attempts:
        description: Kimi draft→verify→repair rounds (when provider=moonshot)
        required: false
        default: '6'

permissions:
  contents: read

jobs:
  target-attempt:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install elan (Lean toolchain manager)
        run: |
          curl -fsSL https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh \
            | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Fetch prebuilt Mathlib cache
        run: lake exe cache get

      - name: Run target theorem attempt
        env:
          FEATHERLESS_API_KEY: ${{ secrets.FEATHERLESS_API_KEY }}
          KIMI_API_KEY: ${{ secrets.KIMI_API_KEY }}
          KIMI_CHAT_URL: ${{ secrets.KIMI_CHAT_URL }}
          INPUT_TARGET: ${{ inputs.target }}
          INPUT_FAST_ATTEMPTS: ${{ inputs.fast_attempts }}
          INPUT_HEAVY_ATTEMPTS: ${{ inputs.heavy_attempts }}
          INPUT_PROVIDER: ${{ inputs.provider }}
          INPUT_KIMI_ATTEMPTS: ${{ inputs.kimi_attempts }}
        run: |
          TARGET="${INPUT_TARGET:-zmod_from_mod_zero}"
          FAST_ATTEMPTS="${INPUT_FAST_ATTEMPTS:-4}"
          HEAVY_ATTEMPTS="${INPUT_HEAVY_ATTEMPTS:-2}"
          PROVIDER="${INPUT_PROVIDER:-featherless}"
          KIMI_ATTEMPTS="${INPUT_KIMI_ATTEMPTS:-6}"
          python3 scripts/prover_target_attempt.py \
            --target "$TARGET" \
            --provider "$PROVIDER" \
            --fast-attempts "$FAST_ATTEMPTS" \
            --heavy-attempts "$HEAVY_ATTEMPTS" \
            --kimi-attempts "$KIMI_ATTEMPTS"

      - name: Write job summary
        if: always()
        run: |
          if [ -f prover-target-report.md ]; then
            cat prover-target-report.md >> "$GITHUB_STEP_SUMMARY"
          else
            echo "No prover-target-report.md was produced." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload target attempt report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: prover-target-attempt-report
          path: |
            prover-target-report.md
            prover-target-success.lean
            ProverTargetAttempt.lean
          if-no-files-found: ignore
