version: 2
status: accepted
scope: whole_repository
origin_branch: codex/research-os-truth-layer   # reviewed and merged to main; historical reference
purpose: >
  Classify repository artifacts by ownership and edit policy. Accepted and now
  partially enforced: `scripts/check_repo_artifacts.py` (a CI gate) checks the
  path classes and referenced files below stay consistent.
  Every repository file must match at least one class; overlaps require an
  explicit entry in allowed_overlap_paths.

principles:
  - lean_kernel_is_the_proof_authority
  - status_and_stats_are_canonical_for_live_counts
  - generated_artifacts_should_be_changed_through_generators
  - cleanup_is_classify_then_review_then_move_or_delete
  - public_claims_must_preserve_trust_boundaries
  - product_claims_and_mvp_boundaries_are_canonical

classes:
  kernel_verified_surface:
    description: Machine-checked Lean source and project build pins.
    paths:
      - Ecdlp.lean
      - Ecdlp/*.lean
      - Ecdlp/Proved/
      - ResearchOS.lean
      - ResearchOS/
      - lakefile.toml
      - lake-manifest.json
      - lean-toolchain
    owner: proof
    hand_edit: true
    generated: false
    gates:
      - lake build
      - no-sorry gate
      - axiom audit
    risks:
      - Moving files changes imports and review trails.
      - Adding axioms or sorry/admit destroys the central invariant.

  open_targets:
    description: Open conjecture stems and their target metadata.
    paths:
      - Ecdlp/Targets/
      - targets/
    owner: proof_generation
    hand_edit: true
    generated: mixed
    gates:
      - target stem review
      - generator consistency
    risks:
      - Open statements must not be imported into the proved surface.

  canonical_corpus:
    description: Vendored corpus plus curated traceability overlays.
    paths:
      - data/KG_CLAIM_FORMALIZATION_v1.csv
      - data/corpus_coverage_overrides.json
      - data/corpus_triage.json
      - data/corpus_reclassify.json
      - data/claim_traceability.jsonl
      - data/attack_registry.json
      - data/research_decisions.md
      - data/README.md
    owner: frontier
    hand_edit: mixed
    generated: mixed
    gates:
      - checksum/provenance review for the CSV
      - frontier-map regeneration for overlays
    risks:
      - Reformatting the vendored CSV breaks provenance and checksums.

  verified_ledger_and_scope:
    description: Human-auditable theorem ledger and public trust boundaries.
    paths:
      - VERIFIED.md
      - TRUST_REPORT.md
      - ABSTRACT_SCOPE.md
      - BARRIERS.md
      - notes/SECURITY_SCOPE.md
    owner: publication_truth
    hand_edit: true
    generated: false
    gates:
      - scripts/gen_stats.py --check
      - scripts/check_counts.py
      - scripts/check_status_consistency.py
    risks:
      - Duplicate counts drift quickly.
      - Security wording can overclaim beyond the formal model.

  generated_views:
    description: Derived machine-readable and rendered views.
    paths:
      - data/stats.json
      - badges/theorems.json
      - STATUS.md
      - data/frontier_map.json
      - data/knowledge_graph.json
      - data/knowledge_graph.md
      - COVERAGE.md
      - index.html
      - dashboard.html
      - explore.html
      - pilot.html
      - bundles/MANIFEST.json
      - data/result_registry.json
      - data/source_registry.json
      - repo/ECDLP_DECISION_SUBSTRATE.md
      - Ecdlp/LedgerAxiomAudit.lean
    owner: generators
    hand_edit: false
    generated: true
    generators:
      - scripts/gen_stats.py
      - scripts/gen_status.py
      - scripts/build_frontier_map.py
      - scripts/build_knowledge_graph.py
      - scripts/coverage_report.py
      - scripts/build_dashboard.py
      - scripts/site_generator.py
      - scripts/export_agent_bundle.py
      - scripts/gen_result_registry.py
      - scripts/gen_source_registry.py
      - scripts/build_ecdlp_decision_view.py
      - scripts/gen_axiom_audit.py
    gates:
      - scripts/check_status_consistency.py
      - scripts/check_counts.py
      - scripts/check_repo_artifacts.py
      - scripts/export_agent_bundle.py --check
      - scripts/gen_result_registry.py --check
      - scripts/build_ecdlp_decision_view.py --check
      - scripts/check_product_model.py
    risks:
      - Hand edits create invisible drift unless encoded in generators.

  public_site:
    description: Public-facing static site surface and assets.
    paths:
      - index.html
      - dashboard.html
      - explore.html
      - pilot.html
      - assets/
      - fonts/
      - CNAME
    owner: site
    hand_edit: mixed
    generated: mixed
    gates:
      - public-site regeneration
      - status consistency check
      - product model check
      - link/counter review
    risks:
      - Site counters can become stale while proofs remain correct.
      - Product rhetoric can overstate reference-deployment capabilities or imply traction.

  research_os_control_plane:
    description: Files that orient low-context agents and hold active work.
    paths:
      - AGENTS.md
      - CLAUDE.md
      - AUTONOMY.md
      - README.md
      - ROADMAP.md
      - tasks/NEXT.md
      - experiments/HYPOTHESES.yaml
      - REPOSITORY_ARCHITECTURE.md
      - repo/ARTIFACTS.yaml
      - repo/CLEANUP_PLAN.md
      - repo/FORMAL_SUBSTRATE.json
      - repo/ECDLP_DECISION_SUBSTRATE.json
      - repo/PRODUCT_MODEL.json
      - repo/PILOT_PROTOCOL.json
      - repo/AUTOMATION_INVENTORY.json
      - repo/BRANCH_INVENTORY.json
      - repo/FINAL_REVIEW_PACKET.md
      - bundles/README.md
      - domains/
    owner: operations
    hand_edit: true
    generated: false
    gates:
      - scripts/check_status_consistency.py
      - scripts/check_repo_artifacts.py
      - scripts/check_automation_inventory.py
      - scripts/check_ecdlp_decision_substrate.py
      - scripts/check_product_model.py
      - scripts/check_domains.py
      - independent architecture review when available
    risks:
      - Too much prose can become another stale source of truth.

  automation_and_scripts:
    description: CI, generators, autonomous loops, server helpers, and prompts.
    paths:
      - .github/workflows/
      - .github/ISSUE_TEMPLATE/
      - scripts/
      - prompts/
      - requirements.txt
      - .gitignore
    owner: automation
    hand_edit: true
    generated: false
    gates:
      - relevant script checks
      - GitHub Actions
      - py_compile for changed Python scripts
    risks:
      - Workflow names in docs can drift from actual workflow files.
      - Autonomous loops must remain draft/review gated.

  curated_research_notes:
    description: Durable research memory and publication planning.
    paths:
      - notes/*.md
      - notes/reviews/
      - docs/
      - PUBLISHABLE_UNITS.md
      - SETUP.md
    owner: research_memory
    hand_edit: true
    generated: false
    gates:
      - link review
      - count-drift checks where applicable
    risks:
      - Notes can preserve old claims after the formal state changes.

  archive:
    description: >
      Frozen history: superseded strategy docs (collapsed into ROADMAP.md), raw
      exploratory traces (ward, scratch), and the undeployed Phase-2 platform
      scaffold. Nothing here is a live surface; revive via git mv or a new repo.
    paths:
      - archive/docs/
      - archive/ward/
      - archive/scratch/
      - archive/platform/
      - archive/generator-report.md
    owner: history
    hand_edit: false
    generated: false
    gates:
      - content is frozen; changes belong in live surfaces, not here
    risks:
      - Archived prose can contain stale claims; nothing may cite it as current
        except with an explicit archive/ path.

  reproducible_experiments:
    description: Reproducible but non-kernel experimental code, manifests, and measured results.
    paths:
      - experiments/
    owner: experiments
    hand_edit: true
    generated: mixed
    gates:
      - experiment-specific validation scripts
      - hypotheses must authorize active work
    risks:
      - Measurements are evidence, never proofs or verified ECDLP claims.

allowed_overlap_paths:
  - index.html
  - dashboard.html
  - explore.html
  - pilot.html
  - Ecdlp/LedgerAxiomAudit.lean
  - experiments/HYPOTHESES.yaml
  - notes/SECURITY_SCOPE.md

cleanup_candidates:
  - path: archive/
    proposed_action: review_retention_in_dedicated_audit
    priority: low
    reason: >
      Archived material is excluded from the canonical truth surface. Retain it
      through a dedicated retention audit, then remove only entries whose provenance and
      replacement are both documented.
    delete_now: false

# Executed 2026-07 (ROADMAP.md §4, tranche 1): notes/ward/ -> archive/ward/,
# scratch/ -> archive/scratch/, generator-report.md -> archive/,
# platform/ -> archive/platform/ (platform-ci.yml retired), and the superseded
# strategy/review docs -> archive/docs/.

deferred_actions:
  - id: archive-retention-review
    goal: Decide archive retention only in a dedicated inventory-first audit with reference scans and a restore path; do not delete during substrate or product normalization.
  - id: v01-tag
    goal: Tag v0.1 only after the integration PR merges and the full gate battery is green on main.

review_questions:
  - Which paths are misclassified?
  - Which cleanup candidates are actually still active?
  - Which generated artifacts lack a reliable generator or check?
  - Which public docs still duplicate canonical counts or stale workflow names?
  - Which deferred action would reduce the most future drift without erasing evidence?
